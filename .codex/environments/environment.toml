# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "BionicAthlete"

[setup]
script = '''
#!/usr/bin/env bash
set -euo pipefail

GARMIN_FIT_SDK_VERSION="21.195.0"

mkdir -p /workspace/refs
cd /workspace/refs

require_command() {
  local command_name="$1"
  local install_hint="$2"

  if ! command -v "$command_name" >/dev/null 2>&1; then
    echo "Required command not found: $command_name"
    echo "Install hint: $install_hint"
    exit 1
  fi
}

clone_or_update_tagged_repo() {
  local repository_url="$1"
  local target_directory="$2"
  local tag_name="$3"

  if [ -d "$target_directory/.git" ]; then
    echo "Updating $target_directory to tag $tag_name..."
    git -C "$target_directory" fetch --depth 1 origin "refs/tags/$tag_name:refs/tags/$tag_name"
    git -C "$target_directory" checkout --force "$tag_name"
    git -C "$target_directory" reset --hard "$tag_name"
  else
    echo "Cloning $target_directory at tag $tag_name..."
    git clone --branch "$tag_name" --depth 1 "$repository_url" "$target_directory"
  fi
}

require_command git "Install Git."
require_command dotnet "Install the .NET SDK used by this repository."

# fit-sdk-tools uses Git LFS for large binaries such as Profile.xlsx / JAR files.
require_command git-lfs "Install Git LFS."

git lfs install --skip-repo

clone_or_update_tagged_repo \
  https://github.com/garmin/fit-csharp-sdk.git \
  fit-csharp-sdk \
  "$GARMIN_FIT_SDK_VERSION"

clone_or_update_tagged_repo \
  https://github.com/garmin/fit-sdk-tools.git \
  fit-sdk-tools \
  "$GARMIN_FIT_SDK_VERSION"

# Ensure LFS-managed files are materialized, not left as pointer files.
git -C /workspace/refs/fit-sdk-tools lfs pull

cd /workspace/project

dotnet restore
dotnet build --no-restore
'''

[setup.win32]
script = '''
$ErrorActionPreference = "Stop"

$garminFitSdkVersion = "21.195.0"
$refsDirectory = "C:\codex-workspace\refs"

function Require-Command {
    param(
        [Parameter(Mandatory = $true)]
        [string]$CommandName,
        [Parameter(Mandatory = $true)]
        [string]$InstallHint
    )

    if (-not (Get-Command $CommandName -ErrorAction SilentlyContinue)) {
        throw "Required command not found: $CommandName. Install hint: $InstallHint"
    }
}

function Clone-OrUpdateTaggedRepo {
    param(
        [Parameter(Mandatory = $true)]
        [string]$RepositoryUrl,
        [Parameter(Mandatory = $true)]
        [string]$TargetDirectory,
        [Parameter(Mandatory = $true)]
        [string]$TagName
    )

    if (Test-Path (Join-Path $TargetDirectory ".git")) {
        Write-Host "Updating $TargetDirectory to tag $TagName..."
        git -C $TargetDirectory fetch --depth 1 origin tag $TagName
        git -C $TargetDirectory checkout --force $TagName
        git -C $TargetDirectory reset --hard $TagName
    }
    else {
        Write-Host "Cloning $TargetDirectory at tag $TagName..."
        git clone --branch $TagName --depth 1 $RepositoryUrl $TargetDirectory
    }
}

Require-Command -CommandName "git" -InstallHint "Install Git for Windows."
Require-Command -CommandName "git-lfs" -InstallHint "Install Git LFS."
Require-Command -CommandName "dotnet" -InstallHint "Install the .NET SDK used by this repository."

New-Item -ItemType Directory -Force -Path $refsDirectory | Out-Null

git lfs install --skip-repo

$fitCSharpSdkDirectory = Join-Path $refsDirectory "fit-csharp-sdk"
$fitSdkToolsDirectory = Join-Path $refsDirectory "fit-sdk-tools"

Clone-OrUpdateTaggedRepo `
    -RepositoryUrl "https://github.com/garmin/fit-csharp-sdk.git" `
    -TargetDirectory $fitCSharpSdkDirectory `
    -TagName $garminFitSdkVersion

Clone-OrUpdateTaggedRepo `
    -RepositoryUrl "https://github.com/garmin/fit-sdk-tools.git" `
    -TargetDirectory $fitSdkToolsDirectory `
    -TagName $garminFitSdkVersion

git -C $fitSdkToolsDirectory lfs pull
'''

